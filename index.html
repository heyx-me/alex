<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Cosmic Game - Perfect Glide</title>
    <style>
        html, body { background: #030305; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        body { touch-action: none; }
        #three-container { position: fixed; inset: 0; z-index: 0; }
        #ui-overlay { position: fixed; top: 20px; left: 20px; color: white; font: 24px Arial; text-shadow: 0 0 10px #0ff; z-index: 2; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui-overlay">SCORE: <span id="score">0</span></div>
    <div id="three-container"></div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        const scoreEl = document.getElementById('score'), WORLD_H = 150;
        let score = 0, scrollY = 0, targetScrollY = 0, autoTime = 0;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030305, 0.012);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('three-container').appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.4, 0.3));
        composer.addPass(new OutputPass());

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.PointLight(0xffffff, 100, 100); light.position.set(0, 0, 15); scene.add(light);

        const calcY = (offset, move) => ((offset + move) % WORLD_H + WORLD_H) % WORLD_H - (WORLD_H / 2);

        const stars1 = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(2000 * 3).map(() => (Math.random()-0.5)*200), 3)), new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.4 }));
        const stars2 = stars1.clone(); scene.add(stars1, stars2);

        const pyramids = [], pyramidColors = [0x00ffff, 0xff00ff, 0x00ffaa, 0xaa00ff];
        for (let i = 0; i < 6; i++) {
            const g = new THREE.Group(), geom = new THREE.ConeGeometry(1.8, 3, 4); geom.rotateX(Math.PI/2);
            const m = new THREE.Mesh(geom, new THREE.MeshPhongMaterial({ color: pyramidColors[i%4], transparent: true, opacity: 0.4, flatShading: true, side: 2 }));
            m.add(new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color: pyramidColors[i%4], wireframe: true, transparent: true, opacity: 0.2 })));
            g.add(m); scene.add(g);
            pyramids.push({ 
                container: g, mesh: m, yOffset: (i/6)*WORLD_H, phase: Math.random()*Math.PI*2, 
                ampX: 5+Math.random()*3, ampZ: 3+Math.random()*2, freq: 1+Math.random()*0.5, 
                color: pyramidColors[i%4], lookPos: new THREE.Vector3(), 
                bVel: 0, bAcc: 0, lockAlpha: 0, currentTarget: null, 
                lockCooldown: 0, lastRelY: -1, lastTargetPos: new THREE.Vector3(),
                lastPos: new THREE.Vector3(), collisions: 0
            });
        }

        const rings = [];
        for (let i = 0; i < 8; i++) {
            const r = new THREE.Mesh(new THREE.TorusGeometry(3, 0.1, 16, 32), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 }));
            scene.add(r);
            rings.push({ mesh: r, id: i, yOffset: (i/8)*WORLD_H, xPos: ((i%4)-1.5)*4, zPos: (Math.random()-0.5)*4, wrap: 0, hit: false, color: null, lookPos: new THREE.Vector3(), lockedBy: null, collisions: 0 });
        }

        const particles = [];
        const spawnExplosion = (pos, color) => {
            const count = 40, geom = new THREE.BufferGeometry(), positions = new Float32Array(count * 3), vels = [];
            for(let i=0; i<count; i++) { positions.set([pos.x, pos.y, pos.z], i*3); vels.push(new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8)); }
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const pts = new THREE.Points(geom, new THREE.PointsMaterial({ color, size: 0.2, transparent: true }));
            scene.add(pts); particles.push({ pts, vels, life: 1 });
        };

        let lastTouchY = 0;
        window.addEventListener('wheel', (e) => { targetScrollY += e.deltaY; }, { passive: true });
        window.addEventListener('touchstart', (e) => { lastTouchY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener('touchmove', (e) => { 
            const delta = lastTouchY - e.touches[0].clientY;
            targetScrollY += delta * 2; lastTouchY = e.touches[0].clientY;
        }, { passive: true });
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta(), time = clock.getElapsedTime();
            autoTime += dt * 5; scrollY += (targetScrollY - scrollY) * 0.05;
            const move = autoTime + (scrollY * 0.015);

            stars1.position.y = (move * 0.2) % WORLD_H;
            stars2.position.y = stars1.position.y - WORLD_H;

            // 1. UPDATE RINGS FIRST
            rings.forEach(r => {
                const rawY = r.yOffset - move;
                r.mesh.position.y = ((rawY % WORLD_H) + WORLD_H) % WORLD_H - (WORLD_H / 2);
                const curWrap = Math.floor(rawY / WORLD_H);
                if (curWrap !== r.wrap) {
                    r.hit = false; r.mesh.visible = true; r.mesh.material.color.set(0xffffff); r.mesh.material.opacity = 0.4;
                    r.xPos = (Math.random()-0.5)*16; r.zPos = (Math.random()-0.5)*6; r.wrap = curWrap; r.color = null; r.lockedBy = null;
                }
                
                if (!r.color) {
                    let bestP = null, minPD = Infinity;
                    pyramids.forEach(p => { 
                        const d = r.mesh.position.distanceTo(p.container.position);
                        const dy = r.mesh.position.y - p.container.position.y;
                        if (dy > -10 && d < minPD) { minPD = d; bestP = p; }
                    });
                    if (bestP && !r.lockedBy) {
                        const pull = Math.pow(Math.max(0, 1 - minPD / 45), 1.5) * 0.05;
                        r.xPos += (bestP.container.position.x - r.xPos) * pull;
                        r.zPos += (bestP.container.position.z - r.zPos) * pull;
                        r.lookPos.lerp(bestP.container.position, 0.1); r.mesh.lookAt(r.lookPos);
                    }
                }
                r.mesh.position.set(r.xPos, r.mesh.position.y, r.zPos);
            });

            // 2. UPDATE PYRAMIDS BASED ON UPDATED RINGS
            pyramids.forEach(p => {
                p.lastPos.copy(p.container.position);
                p.bAcc += p.bVel * dt; p.bVel *= 0.94;
                p.container.position.y = calcY(p.yOffset, move + p.bAcc);
                const angle = time * p.freq + p.phase;
                const orbitX = Math.cos(angle) * p.ampX, orbitZ = Math.sin(angle) * p.ampZ;

                if (p.lockCooldown > 0) p.lockCooldown -= dt;

                // Sticky target logic
                if (p.currentTarget) {
                    const dy = p.currentTarget.mesh.position.y - p.container.position.y;
                    if (dy < -5 || dy > 45 || p.currentTarget.hit) {
                        if (p.currentTarget.lockedBy === p) p.currentTarget.lockedBy = null;
                        p.currentTarget = null; p.lockCooldown = 0.5;
                    }
                }
                if (!p.currentTarget && p.lockCooldown <= 0) {
                    let minD = Infinity;
                    rings.forEach(r => {
                        const dy = r.mesh.position.y - p.container.position.y;
                        // Tightened targeting: only look at rings near or entering the viewport
                        if (dy > 0 && dy < 25 && r.color !== p.color && !r.hit && Math.abs(r.mesh.position.y) < 20) {
                            const d = r.mesh.position.distanceTo(p.container.position);
                            if (d < minD) { minD = d; p.currentTarget = r; }
                        }
                    });
                }

                const target = p.currentTarget;

                if (target) {
                    const dy = target.mesh.position.y - p.container.position.y;
                    // Slower, smoother alpha transition
                    p.lockAlpha = THREE.MathUtils.lerp(p.lockAlpha, (dy < 25 && dy > -2) ? 1 : 0, 0.005);
                    p.lastTargetPos.copy(target.mesh.position);
                    p.lookPos.lerp(target.mesh.position, 0.015);
                    
                    if (p.lockAlpha > 0.7) target.lockedBy = p;
                    else if (target.lockedBy === p) target.lockedBy = null;
                    
                    // Collision & Slingshot (Exact Crossing + Through Hole Filter)
                    const relY = p.container.position.y - target.mesh.position.y;
                    const passed = p.lastRelY < 0 && relY >= 0; // Negative to positive
                    const isInView = Math.abs(target.mesh.position.y) < 14; 
                    
                    if (isInView && passed) {
                        // Find distance at exact crossing moment via interpolation
                        const t = Math.abs(p.lastRelY) / (Math.abs(p.lastRelY) + Math.abs(relY));
                        const crossX = THREE.MathUtils.lerp(p.lastPos.x, p.container.position.x, t);
                        const crossZ = THREE.MathUtils.lerp(p.lastPos.z, p.container.position.z, t);
                        const distToCenter = Math.sqrt(Math.pow(crossX - target.mesh.position.x, 2) + Math.pow(crossZ - target.mesh.position.z, 2));

                        // Alignment-aware strictness
                        const pDir = new THREE.Vector3(0,0,1).applyQuaternion(p.container.quaternion);
                        const rDir = new THREE.Vector3(0,0,1).applyQuaternion(target.mesh.quaternion);
                        const alignment = Math.abs(pDir.dot(rDir)); // 1.0 = perfect, 0.0 = perpendicular
                        
                        // Strictness: threshold shrinks as alignment worsens. 
                        // If we already collided, we relax the rule slightly as requested.
                        let threshold = 1.1 * Math.pow(alignment, 2); 
                        if (p.collisions > 0) threshold *= 1.5; 

                        if (distToCenter < threshold) { // Successful Pass
                            if (target.color !== p.color) {
                                target.mesh.material.color.set(p.color); target.mesh.material.opacity = 0.8; target.color = p.color;
                                if (!target.hit) { target.hit = true; score++; scoreEl.innerText = score; }
                                spawnExplosion(target.mesh.position, p.color);
                                p.bVel += 70 * dt; p.collisions = 0; 
                                p.currentTarget = null; p.lockCooldown = 1.0; 
                            }
                        } else if (distToCenter < 3.2) { // Collision
                            spawnExplosion(p.container.position, 0xff4400); 
                            p.bVel = -25; p.collisions++; target.collisions++; // Stronger rebound to allow "hit after collision"
                            
                            if (p.collisions >= 3) {
                                spawnExplosion(p.container.position, p.color);
                                p.collisions = 0; p.bAcc = 0; p.bVel = 0; 
                                p.container.position.y = calcY(p.yOffset, move);
                                p.currentTarget = null; p.lockCooldown = 3.0;
                            }
                            if (target.collisions >= 3) {
                                spawnExplosion(target.mesh.position, 0xffffff);
                                target.collisions = 0; target.wrap--; 
                                target.mesh.visible = false;
                                p.currentTarget = null;
                            }
                            // Note: p.currentTarget is NOT cleared here unless destroyed, 
                            // allowing the rebound to potentially trigger another 'passed' event.
                        }
                    }
                    p.lastRelY = relY;
                } else {
                    p.lockAlpha = THREE.MathUtils.lerp(p.lockAlpha, 0, 0.005);
                    p.lookPos.lerp(new THREE.Vector3(p.container.position.x, p.container.position.y + 10, p.container.position.z), 0.01);
                    p.lastRelY = -1;
                }

                // Smoothly blend goal from last target back to orbit using fading lockAlpha
                const goalX = THREE.MathUtils.lerp(orbitX, p.lastTargetPos.x, p.lockAlpha);
                const goalZ = THREE.MathUtils.lerp(orbitZ, p.lastTargetPos.z, p.lockAlpha);

                const dx = goalX - p.container.position.x;
                const dz = goalZ - p.container.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist > 0.001) {
                    // Capped movement speed with slow-start easing
                    const maxSpeed = 8 * dt; 
                    const moveAmt = Math.min(dist, maxSpeed * Math.min(1, dist * 0.4 + 0.02));
                    p.container.position.x += (dx / dist) * moveAmt;
                    p.container.position.z += (dz / dist) * moveAmt;
                }

                p.container.lookAt(p.lookPos); p.mesh.rotation.z += 0.5 * dt;
            });

            // 3. PARTICLES
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.life -= dt * 0.7;
                const posArr = p.pts.geometry.attributes.position.array;
                p.vels.forEach((v, j) => { posArr[j*3] += v.x; posArr[j*3+1] += v.y; posArr[j*3+2] += v.z; });
                p.pts.geometry.attributes.position.needsUpdate = true; p.pts.material.opacity = p.life;
                if (p.life <= 0) { scene.remove(p.pts); particles.splice(i, 1); }
            }
            composer.render();
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
