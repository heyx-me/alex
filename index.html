<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Cosmic Game - Orbital Pursuit</title>
    <style>
        html { background-color: #030305; height: 100%; width: 100%; }
        body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow-x: hidden; overflow-y: auto; scrollbar-width: none;
            background: transparent; -webkit-overflow-scrolling: touch;
        }
        body::-webkit-scrollbar { display: none; }
        #three-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
        #scroll-proxy { position: relative; height: 100000vh; width: 100%; z-index: 1; pointer-events: auto; }
        #ui-overlay {
            position: fixed; top: 20px; left: 20px; color: white;
            font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px;
            text-shadow: 0 0 10px rgba(0,255,255,0.8); pointer-events: none; z-index: 2;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">SCORE: <span id="score">0</span></div>
    <div id="three-container"></div>
    <div id="scroll-proxy"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        const container = document.getElementById('three-container');
        const scoreEl = document.getElementById('score');
        let score = 0;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030305, 0.012);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15; 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const mainLight = new THREE.PointLight(0xffffff, 100, 100);
        mainLight.position.set(0, 0, 15);
        scene.add(mainLight);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.4, 0.3));
        composer.addPass(new OutputPass());

        const WORLD_HEIGHT = 150; 

        function createStars() {
            const starCount = 2000;
            const starPos = new Float32Array(starCount * 3);
            for(let i = 0; i < starCount * 3; i += 3) {
                starPos[i] = (Math.random() - 0.5) * 200;
                starPos[i+1] = (Math.random() - 0.5) * WORLD_HEIGHT; 
                starPos[i+2] = (Math.random() - 0.5) * 100 - 30;
            }
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            return new THREE.Points(geom, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.4 }));
        }
        const stars1 = createStars();
        const stars2 = stars1.clone();
        scene.add(stars1, stars2);

        const particles = [];
        function createExplosion(pos, color) {
            const count = 40;
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const vels = [];
            for(let i = 0; i < count; i++) {
                positions[i*3] = pos.x; positions[i*3+1] = pos.y; positions[i*3+2] = pos.z;
                vels.push(new THREE.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8));
            }
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const points = new THREE.Points(geom, new THREE.PointsMaterial({ color, size: 0.2, transparent: true }));
            scene.add(points);
            particles.push({ mesh: points, vels, life: 1.0 });
        }

        const pyramids = [];
        const pyramidColors = [0x00ffff, 0xff00ff, 0x00ffaa, 0xaa00ff];
        for (let i = 0; i < 6; i++) {
            const group = new THREE.Group();
            const geom = new THREE.ConeGeometry(1.8, 3, 4);
            geom.rotateX(Math.PI / 2); 
            const mat = new THREE.MeshPhongMaterial({ color: pyramidColors[i % 4], transparent: true, opacity: 0.4, flatShading: true, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geom, mat);
            const wire = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color: pyramidColors[i % 4], wireframe: true, transparent: true, opacity: 0.2 }));
            mesh.add(wire);
            group.add(mesh);
            scene.add(group);
            
            pyramids.push({ 
                container: group, mesh, 
                yOffset: (i / 6) * WORLD_HEIGHT, 
                phase: Math.random() * Math.PI * 2,
                ampX: 5.0 + Math.random() * 3.0,
                ampZ: 3.0 + Math.random() * 2.0,
                freq: 1.0 + Math.random() * 0.5,
                color: pyramidColors[i % 4], 
                smoothLookTarget: new THREE.Vector3(),
                attractionOffset: new THREE.Vector3(),
                boostVelocity: 0,
                accumulatedBoost: 0,
                orbitDamping: 1.0 // 1 = circular, 0 = direct point
            });
        }

        const rings = [];
        for (let i = 0; i < 8; i++) {
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(3.0, 0.1, 16, 32),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 })
            );
            scene.add(ring);
            rings.push({ 
                mesh: ring, id: "ring_" + i,
                yOffset: (i / 8) * WORLD_HEIGHT, 
                xPos: ((i % 4) - 1.5) * 4, 
                zPos: (Math.random() - 0.5) * 4,
                wrapCount: 0, 
                hit: false,
                capturedColor: null,
                smoothLookTarget: new THREE.Vector3() 
            });
        }

        let scrollY = 0, targetScrollY = 0, autoTimeAccum = 0;
        window.addEventListener('scroll', () => { targetScrollY = window.scrollY; }, { passive: true });

        const clock = new THREE.Clock();
        const v1 = new THREE.Vector3();
        const v2 = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta(), time = clock.getElapsedTime();

            autoTimeAccum += delta * 5.0; 
            scrollY += (targetScrollY - scrollY) * 0.05;
            const movement = autoTimeAccum + (scrollY * 0.015);

            stars1.position.y = (movement * 0.2) % WORLD_HEIGHT;
            stars2.position.y = (movement * 0.2) % WORLD_HEIGHT - WORLD_HEIGHT;

            pyramids.forEach(p => {
                p.accumulatedBoost += p.boostVelocity * delta;
                p.boostVelocity *= 0.94;
                if (p.boostVelocity < 0.1) p.boostVelocity = 0;

                let y = ((p.yOffset + movement + p.accumulatedBoost) % WORLD_HEIGHT + WORLD_HEIGHT) % WORLD_HEIGHT - (WORLD_HEIGHT / 2);
                p.container.position.y = y;
                
                // ORBITAL MOVEMENT
                const angle = time * p.freq + p.phase;
                let baseTargetX = Math.cos(angle) * p.ampX * p.orbitDamping;
                let baseTargetZ = Math.sin(angle) * p.ampZ * p.orbitDamping;

                // Target Search
                let bestRing = null;
                let minDist = Infinity;
                rings.forEach(r => {
                    r.mesh.getWorldPosition(v1);
                    p.container.getWorldPosition(v2);
                    const dy = v1.y - v2.y;
                    if (dy > -5 && dy < 50 && r.capturedColor !== p.color) {
                        const d = v1.distanceTo(v2);
                        if (d < minDist) { minDist = d; bestRing = r; }
                    }
                });

                if (bestRing) {
                    bestRing.mesh.getWorldPosition(v1);
                    const dyAbs = Math.abs(v1.y - p.container.position.y);
                    
                    // SLOW GAP CLOSURE (Magnetic suction weakened initially)
                    const pullFactor = Math.pow(Math.max(0, 1.0 - dyAbs / 40.0), 2.0);
                    const pull = pullFactor * 0.08; 
                    
                    p.attractionOffset.x += (v1.x - (baseTargetX + p.attractionOffset.x)) * pull;
                    p.attractionOffset.z += (v1.z - (baseTargetZ + p.attractionOffset.z)) * pull;
                    
                    // DAMPEN ORBIT AS WE GET CLOSER
                    p.orbitDamping = THREE.MathUtils.lerp(p.orbitDamping, 1.0 - pullFactor * 0.8, 0.05);

                    p.smoothLookTarget.lerp(v1, 0.1);

                    // Slingshot
                    if (dyAbs < 1.5 && minDist < 2.0) {
                        p.boostVelocity += 60.0 * delta; 
                    }
                } else {
                    p.attractionOffset.lerp(new THREE.Vector3(), 0.02);
                    p.orbitDamping = THREE.MathUtils.lerp(p.orbitDamping, 1.0, 0.02);
                    v1.set(p.container.position.x, p.container.position.y + 10, p.container.position.z);
                    p.smoothLookTarget.lerp(v1, 0.05);
                }

                p.container.position.x = baseTargetX + p.attractionOffset.x;
                p.container.position.z = baseTargetZ + p.attractionOffset.z;
                p.container.lookAt(p.smoothLookTarget);
                p.mesh.rotation.z += 0.5 * delta;
            });

            rings.forEach(r => {
                let rawY = r.yOffset - movement;
                let y = ((rawY % WORLD_HEIGHT) + WORLD_HEIGHT) % WORLD_HEIGHT - (WORLD_HEIGHT / 2);
                const currentWrap = Math.floor(rawY / WORLD_HEIGHT);
                if (currentWrap !== r.wrapCount) {
                    r.hit = false; r.mesh.visible = true;
                    r.mesh.material.color.set(0xffffff);
                    r.mesh.material.opacity = 0.4;
                    r.xPos = ((Math.random() * 4) - 2) * 4;
                    r.zPos = (Math.random() - 0.5) * 6;
                    r.wrapCount = currentWrap;
                    r.capturedColor = null;
                }
                r.mesh.position.set(r.xPos, y, r.zPos);

                if (!r.capturedColor) {
                    let bestP = null; let minPD = Infinity;
                    pyramids.forEach(p => {
                        const d = r.mesh.position.distanceTo(p.container.position);
                        if (d < minPD) { minPD = d; bestP = p; }
                    });
                    if (bestP) {
                        const pull = Math.pow(Math.max(0, 1.0 - minPD / 45.0), 1.5) * 0.05;
                        r.xPos += (bestP.container.position.x - r.xPos) * pull;
                        r.zPos += (bestP.container.position.z - r.zPos) * pull;
                        r.smoothLookTarget.lerp(bestP.container.position, 0.08);
                        r.mesh.lookAt(r.smoothLookTarget);
                    }
                }

                if (Math.abs(y) < 15) {
                    pyramids.forEach(p => {
                        const dist = p.container.position.distanceTo(r.mesh.position);
                        if (dist < 0.6) {
                            if (r.capturedColor !== p.color) {
                                r.mesh.material.color.set(p.color);
                                r.mesh.material.opacity = 0.8; 
                                r.capturedColor = p.color;
                                if (!r.hit) { r.hit = true; score++; scoreEl.innerText = score; }
                                createExplosion(r.mesh.position, p.color);
                            }
                        }
                    });
                }
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.life -= delta * 0.7;
                const pos = p.mesh.geometry.attributes.position.array;
                for (let j = 0; j < p.vels.length; j++) {
                    pos[j*3] += p.vels[j].x; pos[j*3+1] += p.vels[j].y; pos[j*3+2] += p.vels[j].z;
                }
                p.mesh.geometry.attributes.position.needsUpdate = true;
                p.mesh.material.opacity = p.life;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
