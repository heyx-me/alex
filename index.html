<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Cosmic Game</title>
    <style>
        html { background-color: #030305; height: 100%; width: 100%; }
        body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow-x: hidden; overflow-y: auto; scrollbar-width: none;
            background: transparent; -webkit-overflow-scrolling: touch;
        }
        body::-webkit-scrollbar { display: none; }
        #three-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
        #scroll-proxy { position: relative; height: 100000vh; width: 100%; z-index: 1; pointer-events: auto; }
        #ui-overlay {
            position: fixed; top: 20px; left: 20px; color: white;
            font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px;
            text-shadow: 0 0 10px rgba(0,255,255,0.8); pointer-events: none; z-index: 2;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">SCORE: <span id="score">0</span></div>
    <div id="three-container"></div>
    <div id="scroll-proxy"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        const container = document.getElementById('three-container');
        const scoreEl = document.getElementById('score');
        let score = 0;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030305, 0.01);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15; 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const mainLight = new THREE.PointLight(0xffffff, 100, 100);
        mainLight.position.set(0, 0, 15);
        scene.add(mainLight);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.4, 0.3));
        composer.addPass(new OutputPass());

        // --- CONSTANTS ---
        const WORLD_HEIGHT = 150; // טווח המחזוריות

        // --- SEAMLESS STARS ---
        function createStars() {
            const starCount = 2500;
            const starPos = new Float32Array(starCount * 3);
            for(let i = 0; i < starCount * 3; i += 3) {
                starPos[i] = (Math.random() - 0.5) * 200;
                starPos[i+1] = (Math.random() - 0.5) * WORLD_HEIGHT; 
                starPos[i+2] = (Math.random() - 0.5) * 100 - 30;
            }
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.4 });
            return new THREE.Points(geom, mat);
        }
        const stars1 = createStars();
        const stars2 = stars1.clone();
        scene.add(stars1, stars2);

        // --- EXPLOSIONS ---
        const particles = [];
        function createExplosion(pos, color) {
            const count = 50;
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const vels = [];
            for(let i = 0; i < count; i++) {
                positions[i*3] = pos.x; positions[i*3+1] = pos.y; positions[i*3+2] = pos.z;
                vels.push(new THREE.Vector3((Math.random()-0.5)*0.7, (Math.random()-0.5)*0.7, (Math.random()-0.5)*0.7));
            }
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const points = new THREE.Points(geom, new THREE.PointsMaterial({ color, size: 0.15, transparent: true }));
            scene.add(points);
            particles.push({ mesh: points, vels, life: 1.0 });
        }

        // --- PYRAMIDS (Moving UP) ---
        const pyramids = [];
        const pyramidColors = [0x00ffff, 0xff00ff, 0x00ffaa, 0xaa00ff];
        for (let i = 0; i < 6; i++) {
            const geom = new THREE.ConeGeometry(1.8, 3, 4);
            const mat = new THREE.MeshPhongMaterial({ color: pyramidColors[i % 4], transparent: true, opacity: 0.4, flatShading: true, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geom, mat);
            const wire = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color: pyramidColors[i % 4], wireframe: true, transparent: true, opacity: 0.3 }));
            mesh.add(wire);
            scene.add(mesh);
            pyramids.push({ mesh, yOffset: (i / 6) * WORLD_HEIGHT, phase: i * (Math.PI / 2.5), color: pyramidColors[i % 4] });
        }

        // --- RINGS (Moving DOWN) ---
        const rings = [];
        for (let i = 0; i < 8; i++) {
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(3.0, 0.1, 16, 32),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 })
            );
            scene.add(ring);
            rings.push({ mesh: ring, yOffset: (i / 8) * WORLD_HEIGHT, xPos: (Math.random() - 0.5) * 14, hit: false, wrapCount: 0 });
        }

        let scrollY = 0, targetScrollY = 0, autoTime = 0;
        window.addEventListener('scroll', () => { targetScrollY = window.scrollY; }, { passive: true });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta(), time = clock.getElapsedTime();

            autoTime += 0.05;
            scrollY += (targetScrollY - scrollY) * 0.05;
            const scrollFactor = scrollY * 0.015;
            const movement = autoTime + scrollFactor;

            // Update Stars (Seamless)
            const starMove = (movement * 0.2) % WORLD_HEIGHT;
            stars1.position.y = starMove;
            stars2.position.y = starMove - WORLD_HEIGHT;

            // Update Pyramids: Move UP
            pyramids.forEach(p => {
                let y = ((p.yOffset + movement) % WORLD_HEIGHT + WORLD_HEIGHT) % WORLD_HEIGHT - (WORLD_HEIGHT / 2);
                p.mesh.position.y = y;
                const wave = Math.sin(time * 1.8 + p.phase);
                p.mesh.position.x = wave * 7.5;
                p.mesh.position.z = Math.cos(time * 1.8 + p.phase) * 2.0;
                p.mesh.rotation.y += 0.5 * delta;
            });

            // Update Rings: Move DOWN
            rings.forEach(r => {
                let rawY = r.yOffset - movement;
                let y = ((rawY % WORLD_HEIGHT) + WORLD_HEIGHT) % WORLD_HEIGHT - (WORLD_HEIGHT / 2);
                
                // Reset ring logic when it wraps around (only when invisible)
                const currentWrap = Math.floor(rawY / WORLD_HEIGHT);
                if (currentWrap !== r.wrapCount) {
                    r.hit = false;
                    r.mesh.visible = true;
                    r.xPos = (Math.random() - 0.5) * 14;
                    r.wrapCount = currentWrap;
                }

                r.mesh.position.set(r.xPos, y, 0);
                r.mesh.rotation.z += 0.01;

                // Collision
                if (!r.hit && Math.abs(y) < 15) {
                    pyramids.forEach(p => {
                        if (p.mesh.position.distanceTo(r.mesh.position) < 3.2) {
                            r.hit = true;
                            r.mesh.visible = false;
                            score++;
                            scoreEl.innerText = score;
                            createExplosion(r.mesh.position, p.color);
                        }
                    });
                }
            });

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.life -= delta * 0.7;
                const pos = p.mesh.geometry.attributes.position.array;
                for (let j = 0; j < p.vels.length; j++) {
                    pos[j*3] += p.vels[j].x; pos[j*3+1] += p.vels[j].y; pos[j*3+2] += p.vels[j].z;
                }
                p.mesh.geometry.attributes.position.needsUpdate = true;
                p.mesh.material.opacity = p.life;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
